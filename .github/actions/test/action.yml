name: Test Gradle project
description: Ejecuta la suite de tests unitarios del TP anterior con JUnit y Mockito.

runs:
  using: composite
  steps:
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'
        cache: gradle

    - name: Prepare Gradle wrapper
      shell: bash
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Run tests
      shell: bash
      run: ./gradlew test
